<!-- Sidebar Component - Include this in other templates -->
<style>
    .sidebar {
        width: 260px;
        height: 100vh;
        background: #ffffff;
        position: fixed;
        left: 0;
        top: 0;
        padding: 0;
        box-shadow: 1px 0 3px rgba(0,0,0,0.08);
        border-right: 1px solid #e8e8e8;
    }
    
    .sidebar-header {
        text-align: left;
        padding: 30px 20px;
        border-bottom: 1px solid #f0f0f0;
        margin-bottom: 10px;
    }
    
    .sidebar-header h2 {
        color: #1a1a1a;
        font-size: 1.3rem;
        margin: 0;
        font-weight: 600;
        letter-spacing: -0.5px;
    }
    
    .sidebar-header span {
        color: #1a1a1a;
    }
    
    .sidebar-menu {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    
    .sidebar-menu li {
        margin: 0;
    }
    
    .sidebar-menu a {
        display: flex;
        align-items: center;
        padding: 14px 24px;
        color: #555555;
        text-decoration: none;
        transition: all 0.2s ease;
        font-size: 0.95rem;
        font-weight: 500;
        border-left: 3px solid transparent;
    }
    
    .sidebar-menu a:hover {
        background: #f5f5f5;
        color: #2c5aa0;
    }
    
    .sidebar-menu a.active {
        background: #f0f7ff;
        color: #2c5aa0;
        border-left-color: #2c5aa0;
    }
    
    .menu-icon {
        width: 24px;
        height: 24px;
        margin-right: 16px;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        color: inherit;
    }
</style>
